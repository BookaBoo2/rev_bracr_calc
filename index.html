<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Окно персонажа — Брактеат</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cinzel:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="game-window">
    <header class="win-header">
      <span class="win-title">Окно персонажа</span>
      <div class="win-controls"><span>—</span><span>□</span><span>×</span></div>
    </header>

    <nav class="tabs">
      <button class="tab">Герой</button>
      <button class="tab">Вексели</button>
      <button class="tab">Ремесло</button>
      <button class="tab">Фракции</button>
      <button class="tab">Честь</button>
      <button class="tab">Ранг</button>
      <button class="tab">Стражи</button>
      <button class="tab active">Брактеат</button>
    </nav>

    <div class="win-toolbar">
      <label class="tb-field">
        <span>Диск</span>
        <select id="diskSelect"></select>
      </label>
      <label class="tb-field">
        <span>Уровень персонажа</span>
        <input id="charLevel" type="number" min="1" max="120" value="59" />
      </label>
      <label class="tb-field" id="chaosClassField">
        <span>Класс (хаос)</span>
        <select id="chaosClass"></select>
      </label>
      <label class="tb-field" id="chaosVariantField">
        <span>Тип центрального камня (2 на класс)</span>
        <div id="chaosTypePick" class="chaos-type-pick"></div>
      </label>
      <label class="tb-field" id="chaosLevelField">
        <span>Уровень камня</span>
        <select id="chaosLevel"></select>
      </label>
      <div class="tb-save-row">
        <label class="tb-field">
          <span>Название сборки</span>
          <input id="saveName" type="text" maxlength="80" placeholder="Мой брактеат" />
        </label>
        <button type="button" class="tb-btn" id="btnSaveLocal" title="Сохранить в браузере">Сохранить</button>
        <label class="tb-field">
          <span>Мои сборки</span>
          <select id="savedBuilds"><option value="">—</option></select>
        </label>
        <button type="button" class="tb-btn" id="btnLoadLocal">Загрузить</button>
        <button type="button" class="tb-btn tb-btn-ghost" id="btnDeleteLocal" title="Удалить выбранную">✕</button>
        <button type="button" class="tb-btn" id="btnExportJson">JSON ↓</button>
        <button type="button" class="tb-btn" id="btnImportJson">JSON ↑</button>
        <input type="file" id="importFile" accept="application/json,.json" class="hidden" />
      </div>
    </div>

    <main class="win-body">
      <section class="disk-pane">
        <button type="button" class="disk-share" id="btnShare" title="Скачать JSON">Поделиться</button>
        <div class="bracteate-disk" id="bracteateDisk">
          <div class="disk-stars"></div>
          <div class="disk-segments"></div>
          <div class="disk-zodiac" aria-hidden="true">
            <span>子</span><span>丑</span><span>寅</span><span>卯</span>
            <span>辰</span><span>巳</span><span>午</span><span>未</span>
          </div>
          <div class="disk-outer-band"></div>
          <div class="disk-rim"></div>
          <div id="eternalSlots" class="slot-layer"></div>
          <div id="reincSlots" class="slot-layer"></div>
        </div>
        <div class="disk-footer">
          <button type="button" class="disk-btn" id="btnRunes">Руны</button>
          <button type="button" class="disk-btn" id="btnUpgrade" disabled title="Скоро">Улучшение</button>
        </div>
      </section>

      <aside class="bonus-pane">
        <div class="bonus-head">
          <h2>Бонусы</h2>
          <button type="button" class="link-btn" id="toggleDetails">Детали</button>
        </div>

        <div class="power-bonuses" id="powerBonuses"></div>

        <div class="details-panel hidden" id="detailsPanel">
          <h3>Руны</h3>
          <div class="powers-mini" id="powersGrid"></div>
          <h3>Камни</h3>
          <div class="crystal-mini" id="crystalTable"></div>
        </div>
      </aside>
    </main>

    <footer class="win-footer">
      <span id="appStatus">…</span>
    </footer>
  </div>

  <div class="modal hidden" id="slotModal">
    <div class="modal-card">
      <h3 id="modalTitle">Слот</h3>
      <label id="modalTypeField"><span id="modalTypeLabel">Руна</span>
        <div id="modalTypePick" class="rune-type-pick hidden"></div>
        <select id="modalType" class="hidden"></select>
      </label>
      <label>Уровень
        <select id="modalLevel"></select>
      </label>
      <div class="modal-actions">
        <button type="button" id="modalSave" class="btn-gold">Применить</button>
        <button type="button" id="modalClose" class="btn-ghost">Закрыть</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
